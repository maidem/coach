services:
  app:
    image: ghcr.io/maidem/coach:latest
    container_name: coach
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/app.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD muss gesetzt sein}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET muss gesetzt sein (openssl rand -hex 32)}
    volumes:
      - coach_data:/data

volumes:
  coach_data:
